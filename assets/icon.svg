<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fdf6f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded square base -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#face)" stroke="#15110d" stroke-width="10"/>

  <!-- candy-stripe ribbon across top-right corner -->
  <g filter="url(#shadow)">
    <path d="M 720 64 L 960 64 L 960 304 Z" fill="#c8102e"/>
    <path d="M 760 64 L 800 64 L 960 224 L 960 264 Z" fill="#ffffff" opacity="0.55"/>
    <path d="M 840 64 L 880 64 L 960 144 L 960 184 Z" fill="#ffffff" opacity="0.55"/>
  </g>

  <!-- serif N monogram -->
  <text x="512" y="720"
        font-family="Georgia, 'Source Serif Pro', 'Times New Roman', serif"
        font-weight="700"
        font-size="720"
        text-anchor="middle"
        fill="#c8102e">N</text>

  <!-- subtle baseline rule -->
  <line x1="200" y1="800" x2="824" y2="800" stroke="#c8102e" stroke-width="6" opacity="0.18"/>
</svg>
